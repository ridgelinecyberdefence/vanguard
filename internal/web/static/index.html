function getHuntTarget() {
    const sel = document.querySelector('input[name="hunt-target"]:checked');
    const target = sel ? sel.value : 'live';
    const customField = document.getElementById('hunt-custom-path');
    return {
        target: target,
        custom_path: (target === 'custom' && customField) ? customField.value : '',
    };
}

async function runHunt(scanType) {
    if (!appState.active_case) {
        showToast('Create a case first', 'warning');
        return;
    }
    const btn = (typeof event !== 'undefined') ? event.target : null;
    if (btn) setButtonLoading(btn);
    huntActiveBtn = btn;
    detachHuntHandlers();

    const target = getHuntTarget();
    if (target.target === 'custom' && !target.custom_path) {
        showToast('Enter a custom path or pick a different target', 'warning');
        return;
    }

    const progressEl  = document.getElementById('hunt-progress');
    const detailEl    = document.getElementById('hunt-progress-detail');
    const titleEl     = document.getElementById('hunt-progress-title');
    const resultsEl   = document.getElementById('hunt-results');
    const barEl       = document.getElementById('hunt-bar');

    progressEl.style.display = '';
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
    titleEl.textContent = prettyScanLabel(scanType);
    barEl.style.width = '10%';
    detailEl.innerHTML =
        '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Starting scan...</div>';
    scrollToOutput('hunt-progress');

    huntProgressHandler = function(e) {
        const d = e.detail || {};
        let icon = '&#x21bb;', cls = 'running';
        if (d.status === 'complete') { icon = '&#x2713;'; cls = 'done'; }
        else if (d.status === 'failed') { icon = '&#x2717;'; cls = 'failed'; }
        let html =
            '<div class="progress-item">' +
            '<span class="progress-icon ' + cls + '">' + icon + '</span> ' +
            escapeHTML(d.progress || 'Scanning...') +
            '</div>';
        if (d.findings) html += renderFindingChips(d.findings);
        detailEl.innerHTML = html;
        if (cls === 'running') barEl.style.width = '50%';
    };
    huntCompleteHandler = function(e) {
        detachHuntHandlers();
        if (huntActiveBtn) { clearButtonLoading(huntActiveBtn); huntActiveBtn = null; }
        barEl.style.width = '100%';
        renderHuntComplete(e.detail || {});
    };
    document.addEventListener('ws-hunt_progress', huntProgressHandler);
    document.addEventListener('ws-hunt_complete', huntCompleteHandler);

    try {
        await api('hunt/run', 'POST', { scan_type: scanType, target: target.target, custom_path: target.custom_path });
    } catch (err) {
        detachHuntHandlers();
        if (huntActiveBtn) { clearButtonLoading(huntActiveBtn); huntActiveBtn = null; }
        showToast('Scan failed: ' + err.message, 'error');
        detailEl.innerHTML =
            '<div class="progress-item"><span class="progress-icon failed">&#x2717;</span> ' +
            escapeHTML(err.message) + '</div>';
        barEl.style.width = '0%';
    }
}

function detachHuntHandlers() {
    if (huntProgressHandler) {
        document.removeEventListener('ws-hunt_progress', huntProgressHandler);
        huntProgressHandler = null;
    }
    if (huntCompleteHandler) {
        document.removeEventListener('ws-hunt_complete', huntCompleteHandler);
        huntCompleteHandler = null;
    }
}

function renderFindingChips(f) {
    if (!f) return '';
    const c = function(label, count, color) {
        if (!count) return '';
        return '<span style="color:var(--' + color + ')">' + label + ': ' + count + '</span>';
    };
    const chips = [
        c('Critical', f.critical, 'critical'),
        c('High',     f.high,     'error'),
        c('Medium',   f.medium,   'warning'),
        c('Low',      f.low,      'text-secondary'),
        c('Info',     f.info,     'text-muted'),
    ].filter(function(x) { return x !== ''; });
    if (chips.length === 0) return '';
    return '<div style="display:flex;gap:16px;margin-top:12px;font-size:13px">' + chips.join('') + '</div>';
}

function renderHuntComplete(data) {
    const resultsEl = document.getElementById('hunt-results');
    if (!resultsEl) return;
    resultsEl.style.display = '';

    const f = data.findings || {};
    const sizeStr = formatBytes(data.output_size || 0);
    const totalFindings = (f.critical || 0) + (f.high || 0) + (f.medium || 0);
    const huntBannerStatus = data.error ? 'failed' : (totalFindings > 0 ? 'partial' : 'success');
    const huntBannerDetails = data.error ? data.error :
        (totalFindings > 0 ? totalFindings + ' finding(s) detected' : 'No threats detected') +
        ' — Duration: ' + (data.duration || 0) + 's';
    let html = completionBanner(huntBannerStatus, data.scan || 'Scan', huntBannerDetails) +
        '<div class="card">' +
        '<div class="card-title">' + escapeHTML(data.scan || 'Scan') + ' &mdash; Results</div>' +
        '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px">' +
        '  <div class="stat-card"><div class="label">Duration</div><div class="value" style="font-size:18px">' + (data.duration || 0) + 's</div></div>' +
        '  <div class="stat-card"><div class="label">Critical</div><div class="value" style="font-size:18px;color:var(--red)">' + (f.critical || 0) + '</div></div>' +
        '  <div class="stat-card"><div class="label">High</div><div class="value" style="font-size:18px;color:var(--red)">' + (f.high || 0) + '</div></div>' +
        '  <div class="stat-card"><div class="label">Medium</div><div class="value" style="font-size:18px;color:var(--yellow)">' + (f.medium || 0) + '</div></div>' +
        '  <div class="stat-card"><div class="label">Detections</div><div class="value" style="font-size:18px">' + (data.lines || 0) + '</div></div>' +
        '</div>';

    if (data.output_file) {
        html += '<p style="font-size:13px;margin-bottom:8px">Output: ' +
            '<span style="color:var(--brand);font-family:var(--font-mono);font-size:12px">' +
            escapeHTML(data.output_file) + '</span> (' + escapeHTML(sizeStr) + ')</p>';
    }
    if (data.error) {
        html += '<div style="margin-top:12px;padding:8px 12px;background:rgba(248,113,113,0.08);' +
            'border:1px solid rgba(248,113,113,0.3);border-radius:6px;color:var(--red);font-size:13px">' +
            escapeHTML(data.error) + '</div>';
    } else if (data.warnings && data.warnings.length) {
        data.warnings.forEach(function(w) {
            html += '<div style="margin-top:6px;color:var(--yellow);font-size:12px">&#9888; ' + escapeHTML(w) + '</div>';
        });
    }
    // Surface the tool's own captured stdout/stderr — without this the
    // analyst only sees "exit status N" and has no way to diagnose flag
    // mismatches, missing rules dirs, or locked files.
    if (data.tool_output) {
        html += '<div style="margin-top:12px">' +
            '<div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:4px">Tool Output:</div>' +
            '<pre style="font-size:12px;font-family:var(--font-mono);color:var(--text-2);' +
            'background:var(--bg-code);padding:12px;border-radius:6px;max-height:300px;' +
            'overflow:auto;white-space:pre-wrap;margin:0">' +
            escapeHTML(data.tool_output) + '</pre></div>';
    }
    html += '</div>';
    resultsEl.innerHTML = html;
    scrollToOutput('hunt-results');

    if (data.status === 'failed') {
        showToast('Scan failed', 'error');
    } else {
        showToast('Scan complete', 'success');
    }
}

async function runLiveHunt(check) {

    } catch (err) {

function renderLiveHuntResult(title, result) {
    const resultsEl = document.getElementById('hunt-results');
    const total = result.total || 0;
    const susCount = result.suspicious || 0;
    const susColor = susCount > 0 ? 'var(--red)' : 'var(--green)';

    let html = '<div class="card">' +
        '<div class="card-title">' + escapeHTML(title) + ' &mdash; Results</div>' +
        '<div style="display:flex;gap:24px;margin-bottom:16px;font-size:14px">' +
        '  <span>Total: <strong>' + total + '</strong></span>' +
        '  <span style="color:' + susColor + '">Suspicious: <strong>' + susCount + '</strong></span>' +
        '  <span style="color:var(--text-3)">Duration: ' + (result.duration || 0) + 's</span>' +
        '</div>';

    if (result.findings && result.findings.length > 0) {
        html += '<div class="table-container"><table>' +
            '<thead><tr><th>Severity</th><th>Title</th><th>Detail</th><th>Source</th></tr></thead><tbody>';
        result.findings.forEach(function(f) {
            const sev = (f.severity || 'info').toLowerCase();
            const sevClass = sev === 'critical' ? 'error'
                : sev === 'high' ? 'error'
                : sev === 'medium' ? 'warning'
                : sev === 'low' ? 'info' : 'info';
            html += '<tr>' +
                '<td><span class="badge badge-' + sevClass + '">' + escapeHTML(sev.toUpperCase()) + '</span></td>' +
                '<td>' + escapeHTML(f.title || '') + '</td>' +
                '<td style="color:var(--text-2);font-size:12px">' + escapeHTML(f.detail || '') + '</td>' +
                '<td style="color:var(--text-3);font-size:12px">' + escapeHTML(f.source || '') + '</td>' +
                '</tr>';
        });
        html += '</tbody></table></div>';
    } else {
        html += '<p style="color:var(--green);font-size:13px">No suspicious findings detected.</p>';
    }
    if (result.warnings && result.warnings.length) {
        result.warnings.forEach(function(w) {
            html += '<div style="margin-top:6px;color:var(--yellow);font-size:12px">&#9888; ' + escapeHTML(w) + '</div>';
        });
    }
    html += '</div>';
    resultsEl.innerHTML = html;
}

// prettyScanLabel turns "hayabusa_full" → "Hayabusa Full", "dll_hijack" →
// "Dll Hijack", etc. Used for both scan_type slugs and live-check IDs.
function prettyScanLabel(slug) {
    return slug.split('_').map(function(p) {
        if (p === 'yara') return 'YARA';
        if (p === 'loki') return 'Loki';
        if (p === 'hayabusa') return 'Hayabusa';
        if (p === 'chainsaw') return 'Chainsaw';
        if (p === 'sigma') return 'Sigma';
        if (p === 'ioc') return 'IOC';
        if (p.length === 0) return '';
        return p[0].toUpperCase() + p.slice(1);
    }).join(' ');
}

// renderCSVOutput renders CSV text as an HTML table capped at 200 data rows,
// falling back to a <pre> block for non-CSV content.
function renderCSVOutput(csvText) {
    if (!csvText || csvText.trim().length === 0) {
        return '<p style="color:var(--text-3);font-size:13px">No output</p>';
    }
    const lines = csvText.trim().split('\n').filter(function(l) {
        const t = l.trim();
        return t.length > 0 && !t.startsWith('Progress:') && !t.startsWith('WARNING:') && !t.startsWith('Volatility');
    });
    if (lines.length === 0) {
        return '<p style="color:var(--text-3);font-size:13px">No output</p>';
    }
    if (!lines[0].includes(',')) {
        return '<pre style="font-size:12px;font-family:var(--font-mono);color:var(--text-2);background:var(--bg-code);padding:14px;border-radius:var(--radius);max-height:480px;overflow:auto;white-space:pre-wrap">' + escapeHTML(csvText) + '</pre>';
    }
    const headers = parseCSVLine(lines[0]);
    const dataLines = lines.slice(1);
    const shown = dataLines.slice(0, 200);
    let html = '<p style="font-size:12px;color:var(--text-3);margin-bottom:8px">' + dataLines.length + ' record' + (dataLines.length !== 1 ? 's' : '') + '</p>';
    html += '<div style="max-height:480px;overflow:auto;border:1px solid var(--border-2);border-radius:var(--radius)">';
    html += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<thead><tr style="background:var(--bg-code);position:sticky;top:0">';
    headers.forEach(function(h) {
        html += '<th style="padding:5px 10px;text-align:left;color:var(--text-2);font-weight:500;white-space:nowrap;border-bottom:1px solid var(--border-2)">' + escapeHTML(h) + '</th>';
    });
    html += '</tr></thead><tbody>';
    shown.forEach(function(line) {
        const cols = parseCSVLine(line);
        html += '<tr style="border-bottom:1px solid var(--border-3)">';
        cols.forEach(function(c) {
            html += '<td style="padding:4px 10px;color:var(--text-1);white-space:nowrap;max-width:320px;overflow:hidden;text-overflow:ellipsis" title="' + escapeHTML(c) + '">' + escapeHTML(c) + '</td>';
        });
        html += '</tr>';
    });
    if (dataLines.length > 200) {
        html += '<tr><td colspan="' + headers.length + '" style="padding:8px 10px;color:var(--text-3);text-align:center;font-style:italic">&#8230; ' + (dataLines.length - 200) + ' more rows — open the CSV file for full data</td></tr>';
    }
    html += '</tbody></table></div>';
    return html;
}

// parseCSVLine splits one CSV line into fields, respecting double-quoted values.
function parseCSVLine(line) {
    var result = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
        var c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
        else { cur += c; }
    }
    result.push(cur.trim());
    return result;
}

async function loadMemoryDumps() {
    const sel = document.getElementById('memory-dump-select');
    if (!sel) return;
    try {
        const dumps = await api('memory/dumps');
        if (dumps && dumps.length > 0) {
            sel.innerHTML = dumps.map(function(d) {
                const size = (d.size / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
                return '<option value="' + escapeHTML(d.path) + '">' +
                    escapeHTML(d.name) + ' (' + size + ') &mdash; ' + escapeHTML(d.date || '') + '</option>';
            }).join('');
        } else {
            sel.innerHTML = '<option value="">No dumps found in case directory — use Browse</option>';
        }
    } catch (err) {
        sel.innerHTML = '<option value="">Failed to load case dumps — use Browse</option>';
    }
}

function browseForDump() {
    openFileBrowser('Select Memory Dump', '.raw,.dmp,.vmem,.mem,.lime,.bin,.img,.dd', function(path) {
        const sel = document.getElementById('memory-dump-select');
        if (!sel) return;
        // Add to dropdown if not already present, then select it.
        let found = false;
        for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === path) { sel.selectedIndex = i; found = true; break; }
        }
        if (!found) {
            const opt = document.createElement('option');
            opt.value = path;
            opt.textContent = path.split(/[\/\\]/).pop() + ' (browsed)';
            sel.insertBefore(opt, sel.firstChild);
            sel.selectedIndex = 0;
        }
        // Show the resolved path below the select.
        const pathEl = document.getElementById('selected-dump-path');
        if (pathEl) { pathEl.textContent = path; pathEl.style.display = ''; }
    });
}

let memoryProgressHandler = null;
let memoryCompleteHandler = null;
let memoryAnalysisHandler = null;

function detachMemoryHandlers() {
    if (memoryProgressHandler) { document.removeEventListener('ws-memory_progress', memoryProgressHandler); memoryProgressHandler = null; }
    if (memoryCompleteHandler) { document.removeEventListener('ws-memory_complete', memoryCompleteHandler); memoryCompleteHandler = null; }
    if (memoryAnalysisHandler) { document.removeEventListener('ws-analysis_complete', memoryAnalysisHandler); memoryAnalysisHandler = null; }
}

async function startMemoryCapture(tool) {
    closeModal();
    detachMemoryHandlers();

    const progressEl = document.getElementById('memory-progress');
    const titleEl    = document.getElementById('memory-progress-title');
    const detailEl   = document.getElementById('memory-progress-detail');
    progressEl.style.display = '';
    titleEl.textContent = 'Memory Capture — ' + tool;
    detailEl.innerHTML = '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Capturing memory...</div>';
    scrollToOutput('memory-progress');

    memoryProgressHandler = function(e) {
        const d = e.detail || {};
        detailEl.innerHTML =
            '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> ' +
            escapeHTML(d.progress || 'Capturing...') + '</div>';
    };
    memoryCompleteHandler = function(e) {
        detachMemoryHandlers();
        const d = e.detail || {};
        if (d.error || d.status === 'failed') {
            detailEl.innerHTML = completionBanner('failed', 'Memory Capture', d.error || 'Capture failed');
            showToast('Capture failed', 'error');
            return;
        }
        const sizeGB = ((d.size || 0) / (1024 * 1024 * 1024)).toFixed(1);
        detailEl.innerHTML =
            completionBanner('success', 'Memory Capture',
                'File: ' + (d.output_file || '') + ' — Size: ' + sizeGB + ' GB') +
            '<p style="font-size:13px">SHA256: <span style="font-family:var(--font-mono);font-size:11px">' +
            escapeHTML(d.sha256 || '-') + '</span></p>';
        showToast('Memory capture complete', 'success');
        loadMemoryDumps();
    };
    document.addEventListener('ws-memory_progress', memoryProgressHandler);
    document.addEventListener('ws-memory_complete', memoryCompleteHandler);

    try {
        await api('memory/capture', 'POST', { tool: tool });
    } catch (err) {
        detachMemoryHandlers();
        showToast('Capture failed: ' + err.message, 'error');
    }
}

async function analyzeMemory(plugin) {
    const sel = document.getElementById('memory-dump-select');
    const dumpPath = sel ? sel.value.trim() : '';
    if (!dumpPath) {
        showToast('Select a memory dump or use Browse... to locate one', 'warning');
        return;
    }
    detachMemoryHandlers();

    const progressEl = document.getElementById('memory-progress');
    const titleEl    = document.getElementById('memory-progress-title');
    const detailEl   = document.getElementById('memory-progress-detail');
    progressEl.style.display = '';
    titleEl.textContent = 'Analysis — ' + plugin;
    detailEl.innerHTML = '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Running Volatility3...</div>';
    scrollToOutput('memory-progress');

    memoryAnalysisHandler = function(e) {
        detachMemoryHandlers();
        const d = e.detail || {};
        const resultsEl = document.getElementById('memory-results');
        const rTitle = document.getElementById('memory-results-title');
        const rDetail = document.getElementById('memory-results-detail');
        resultsEl.style.display = '';
        rTitle.textContent = plugin + ' Results';
        const analysisStatus = d.error ? 'failed' : 'success';
        const analysisDetails = d.error ? d.error :
            (d.lines || 0) + ' rows' + (d.duration ? ' in ' + d.duration + 's' : '');
        let html = completionBanner(analysisStatus, plugin, analysisDetails);
        if (d.out_file) {
            html += '<p style="font-size:12px;color:var(--text-3);margin-bottom:10px">Output: <span style="color:var(--brand);font-family:var(--font-mono)">' + escapeHTML(d.out_file) + '</span></p>';
        }
        if (d.report) {
            html += '<p style="margin-top:12px"><a href="file:///' + d.report.replace(/\\/g, '/') + '" target="_blank" style="color:var(--brand);font-weight:600">&#x1F4CB; Open HTML Report</a></p>';
        }
        html += renderCSVOutput(d.output || '');
        if (d.error) {
            html += '<div style="margin-top:10px;padding:10px;background:var(--bg-code);border-left:3px solid var(--red);border-radius:var(--radius)"><p style="font-size:12px;color:var(--red)">' + escapeHTML(d.error) + '</p></div>';
        }
        rDetail.innerHTML = html;
        detailEl.innerHTML =
            '<div class="progress-item"><span class="progress-icon done">&#x2713;</span> Analysis complete (' +
            (d.lines || 0) + ' rows' + (d.duration ? ', ' + d.duration + 's' : '') + ')</div>';
        scrollToOutput('memory-results');
        showToast('Analysis complete', 'success');
    };
    document.addEventListener('ws-analysis_complete', memoryAnalysisHandler);

    try {
        await api('memory/analyze', 'POST', { plugin: plugin, dump_path: dumpPath });
    } catch (err) {
        detachMemoryHandlers();
        showToast('Analysis failed: ' + err.message, 'error');
    }
}

// showPluginBrowser fetches /api/memory/plugins and renders the catalogue
// grouped by OS → category, with a search filter that matches plugin name
// and description. Each row carries a Run button that closes the modal
// and dispatches analyzeMemory() with the canonical plugin name.
async function showPluginBrowser() {
    showModal('Volatility3 Plugin Browser',
        '<div class="form-group" style="margin-bottom:12px">' +
        '  <input class="form-input" id="plugin-filter" placeholder="Filter by name or description..." oninput="renderPluginBrowser()">' +
        '</div>' +
        '<div id="plugin-browser-body" style="max-height:60vh;overflow:auto">Loading...</div>',
        '<button class="btn btn-secondary" onclick="closeModal()">Close</button>'
    );
    try {
        const plugins = await api('memory/plugins');
        window._pluginCatalog = plugins || [];
        renderPluginBrowser();
    } catch (err) {
        const el = document.getElementById('plugin-browser-body');
        if (el) el.innerHTML = '<p style="color:var(--red)">Failed to load plugins: ' + escapeHTML(err.message) + '</p>';
    }
}

function renderPluginBrowser() {
    const body = document.getElementById('plugin-browser-body');
    const filter = (document.getElementById('plugin-filter') || {}).value || '';
    const needle = filter.trim().toLowerCase();
    const plugins = (window._pluginCatalog || []).filter(function(p) {
        if (!needle) return true;
        return p.name.toLowerCase().indexOf(needle) >= 0 ||
               p.description.toLowerCase().indexOf(needle) >= 0 ||
               p.category.toLowerCase().indexOf(needle) >= 0;
    });
    if (plugins.length === 0) {
        body.innerHTML = '<p style="color:var(--text-2);padding:12px">No plugins match "' + escapeHTML(filter) + '"</p>';
        return;
    }
    // Group OS → category → plugins. Stable key order: known OS values
    // first, then anything else; categories alphabetised within OS.
    const osOrder = ['windows', 'linux', 'mac', 'all'];
    const groups = {};
    plugins.forEach(function(p) {
        const os = p.os || 'all';
        const cat = p.category || 'misc';
        if (!groups[os]) groups[os] = {};
        if (!groups[os][cat]) groups[os][cat] = [];
        groups[os][cat].push(p);
    });
    let html = '';
    osOrder.concat(Object.keys(groups).filter(function(o){return osOrder.indexOf(o)<0;})).forEach(function(os) {
        if (!groups[os]) return;
        const osLabel = (os === 'all') ? 'Cross-platform' : os.charAt(0).toUpperCase() + os.slice(1);
        html += '<div style="margin-bottom:18px">' +
            '<h3 style="font-size:14px;color:var(--brand);margin:0 0 8px;text-transform:uppercase;letter-spacing:0.5px">' +
            escapeHTML(osLabel) + '</h3>';
        Object.keys(groups[os]).sort().forEach(function(cat) {
            html += '<div style="margin-bottom:10px">' +
                '<div style="font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;margin-bottom:4px">' +
                escapeHTML(cat) + '</div>';
            groups[os][cat].forEach(function(p) {
                html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 10px;border-bottom:1px solid var(--border-1)">' +
                    '<div style="flex:1;min-width:0">' +
                    '  <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-1)">' + escapeHTML(p.name) + '</div>' +
                    '  <div style="font-size:12px;color:var(--text-2);margin-top:2px">' + escapeHTML(p.description) + '</div>' +
                    '</div>' +
                    '<button class="btn btn-secondary btn-sm" onclick="runFromPluginBrowser(\'' + escapeHTML(p.name) + '\')">Run</button>' +
                    '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    });
    body.innerHTML = html;
}

function runFromPluginBrowser(name) {
    closeModal();
    analyzeMemory(name);
}

// runDiskOp posts the requested type to /api/disk/collect and renders the
// result in the output card. The backend dispatcher routes by prefix (kape_,
// ez_, uac_, logs_, user_, sys_) so this single handler covers every tile.
async function runDiskOp(type) {
    if (!appState.active_case) { showToast('Create a case first', 'warning'); return; }

    const btn      = (typeof event !== 'undefined') ? event.target : null;
    const out      = document.getElementById('disk-output');
    const titleEl  = document.getElementById('disk-out-title');
    const detailEl = document.getElementById('disk-out-detail');
    out.style.display = '';
    titleEl.textContent = prettyDiskLabel(type);
    detailEl.innerHTML =
        '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Running collection...</div>';
    scrollToOutput('disk-output');
    if (btn) setButtonLoading(btn);

    try {
        const r = await api('disk/collect', 'POST', { type: type });
        const status = (r.status || 'ok').toLowerCase();
        const isOk      = status === 'ok' || status === 'success';
        const isPartial = status === 'partial';

        const diskBannerStatus = isOk ? 'success' : (isPartial ? 'partial' : 'failed');
        let html = completionBanner(diskBannerStatus, prettyDiskLabel(type), r.message || 'Complete');
        if (r.output_path) {
            html += '<p style="margin-top:8px;font-size:13px;color:var(--text-2)">Output: ' +
                '<span style="color:var(--brand);font-family:var(--font-mono);font-size:12px">' +
                escapeHTML(r.output_path) + '</span></p>';
        }
        if (r.error) {
            html += '<p style="margin-top:6px;font-size:13px;color:var(--red)">' + escapeHTML(r.error) + '</p>';
        }
        if (typeof r.copied === 'number') {
            html += '<p style="margin-top:6px;font-size:12px;color:var(--text-2)">' +
                'Copied ' + r.copied + ' / Skipped ' + (r.skipped || 0) + '</p>';
        }
        detailEl.innerHTML = html;
        if (isOk)            showToast('Collection complete', 'success');
        else if (isPartial)  showToast('Collection partial — some steps failed', 'warning');
        else                 showToast('Collection failed', 'error');
    } catch (err) {
        detailEl.innerHTML = completionBanner('failed', prettyDiskLabel(type), err.message);
    } finally {
        if (btn) clearButtonLoading(btn);
    }
}

// prettyDiskLabel turns a type slug like "kape_sans" into "KAPE SANS"
// for the progress card heading.
function prettyDiskLabel(slug) {
    return slug.split('_').map(function(p) {
        switch (p) {
            case 'kape': return 'KAPE';
            case 'ez':   return 'EZ Tools';
            case 'uac':  return 'UAC';
            case 'ir':   return 'IR';
            case 'lnk':  return 'LNK';
            case 'srum': return 'SRUM';
            case 'mft':  return 'MFT';
            case 'ssh':  return 'SSH';
        }
        return p ? p[0].toUpperCase() + p.slice(1) : '';
    }).join(' ');
}

async function loadTargets() {
    try {
        const targets = await api('remote/targets');
        window._remoteTargets = targets || [];
        const el = document.getElementById('targets-table');
        if (!el) return;
        if (!targets || targets.length === 0) {
            el.innerHTML = '<p style="font-size:13px;color:var(--text-2)">No targets configured. Add a remote target to get started.</p>';
            return;
        }
        let html = '<div class="table-container"><table>' +
            '<thead><tr><th style="width:32px"></th><th>Hostname</th><th>IP</th><th>OS</th><th>Protocol</th><th>Port</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        targets.forEach(function(t, i) {
            const st = (t.status || 'untested').toLowerCase();
            const sc = st === 'online' ? 'success' : (st === 'offline' ? 'error' : 'warning');
            const checked = t.id === selectedTargetID ? 'checked' : '';
            html += '<tr>' +
                '<td><input type="checkbox" name="target-select" data-id="' + t.id + '" data-idx="' + i + '" ' + checked + ' onchange="onTargetCheckboxChange(this,' + t.id + ')"></td>' +
                '<td style="font-weight:600;color:var(--text-0)">' + escapeHTML(t.hostname || '') + '</td>' +
                '<td style="font-family:var(--font-mono)">' + escapeHTML(t.ip || '') + '</td>' +
                '<td>' + escapeHTML(t.os || '') + '</td>' +
                '<td>' + escapeHTML(t.protocol || '') + '</td>' +
                '<td>' + (t.port || '') + '</td>' +
                '<td><span class="badge badge-' + sc + '">' + escapeHTML(st) + '</span></td>' +
                '<td>' +
                '  <button class="btn btn-secondary btn-sm" onclick="testTarget(' + i + ')">Test</button> ' +
                '  <button class="btn btn-danger btn-sm" onclick="removeTarget(' + i + ')">Remove</button>' +
                '</td>' +
                '</tr>';
        });
        html += '</tbody></table></div>';
        el.innerHTML = html;
    } catch (err) {
        const el = document.getElementById('targets-table');
        if (el) el.innerHTML = '<span style="color:var(--red)">Failed to load targets: ' + escapeHTML(err.message) + '</span>';
    }
}

async function runRemoteTestAuth() {
    if (!selectedTargetID) { showToast('Select a target first', 'warning'); return; }
    credentialPrompt('Test Authentication', async function(password) {
        const outEl = document.getElementById('remote-output');
        const detailEl = document.getElementById('remote-out-detail');
        if (!outEl || !detailEl) return;
        outEl.style.display = '';
        document.getElementById('remote-out-title').textContent = 'Authentication Test';
        detailEl.innerHTML = '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Testing credentials...</div>';
        scrollToOutput('remote-output');
        try {
            const r = await api('remote/execute', 'POST', { target_id: selectedTargetID, password: password, command: 'hostname', timeout_sec: 15 });
            if (r.status === 'ok' || (r.status === 'exit_error' && r.stdout)) {
                detailEl.innerHTML = '<div class="progress-item"><span class="progress-icon done">&#x2713;</span> Authentication succeeded — remote hostname: <strong>' + escapeHTML((r.stdout || '').trim()) + '</strong></div>';

async function runRemoteTriage() {
    if (!selectedTargetID) { showToast('Select a target first', 'warning'); return; }
    credentialPrompt('Quick Triage — Enter Password', async function(password) {
        const outEl = document.getElementById('remote-output');
        const detailEl = document.getElementById('remote-out-detail');
        if (!outEl || !detailEl) return;
        outEl.style.display = '';
        document.getElementById('remote-out-title').textContent = 'Remote Quick Triage';
        detailEl.innerHTML = '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Connecting to target...</div>';
        scrollToOutput('remote-output');

        let progressHandler, completeHandler;
        progressHandler = function(e) {
            const d = e.detail || {};
            if (d.status === 'connected') {
                detailEl.innerHTML =
                    '<div class="progress-item"><span class="progress-icon done">&#x2713;</span> Connected to <strong>' + escapeHTML(d.target || '') + '</strong> — running ' + (d.total || 0) + ' steps</div>' +
                    '<div id="remote-steps"></div>';
            } else if (d.status === 'step_done') {
                const s = document.getElementById('remote-steps');
                if (s) s.innerHTML += '<div class="progress-item"><span class="progress-icon done">&#x2713;</span> [' + d.step + '/' + d.total + '] ' + escapeHTML(d.name || '') + '</div>';
            } else if (d.status === 'step_error') {
                const s = document.getElementById('remote-steps');
                if (s) s.innerHTML += '<div class="progress-item"><span class="progress-icon failed">&#x2717;</span> [' + d.step + '/' + d.total + '] ' + escapeHTML(d.name || '') + ': ' + escapeHTML(d.error || '') + '</div>';
            } else if (d.status === 'error') {
                document.removeEventListener('ws-remote_progress', progressHandler);
                document.removeEventListener('ws-remote_complete', completeHandler);
                detailEl.innerHTML += '<div class="progress-item"><span class="progress-icon failed">&#x2717;</span> <span style="color:var(--red)">' + escapeHTML(d.error || 'Operation failed') + '</span></div>';
            }
        };
        completeHandler = function(e) {
            document.removeEventListener('ws-remote_progress', progressHandler);
            document.removeEventListener('ws-remote_complete', completeHandler);
            const d = e.detail || {};
            const stepsEl = document.getElementById('remote-steps');
            if (stepsEl) stepsEl.innerHTML +=
                '<div class="progress-item" style="margin-top:8px;border-top:1px solid var(--border-1);padding-top:8px">' +
                '<span class="progress-icon done">&#x2713;</span> <strong>Collection complete</strong> — ' +
                (d.succeeded || 0) + '/' + (d.total || 0) + ' commands succeeded</div>' +
                '<div style="font-size:12px;color:var(--text-2);margin-top:4px">Saved to: ' + escapeHTML(d.output_dir || '') + '</div>';
        };
        document.addEventListener('ws-remote_progress', progressHandler);
        document.addEventListener('ws-remote_complete', completeHandler);

        try {
            await api('remote/triage', 'POST', { target_id: selectedTargetID, password: password });
        } catch (err) {
            document.removeEventListener('ws-remote_progress', progressHandler);
            document.removeEventListener('ws-remote_complete', completeHandler);
            detailEl.innerHTML = '<div class="progress-item"><span class="progress-icon failed">&#x2717;</span> <span style="color:var(--red)">' + escapeHTML(err.message) + '</span></div>';
        }
    });
}

function showLiveResponse() {
    if (!selectedTargetID) { showToast('Select a target first', 'warning'); return; }

    const tgt = (window._remoteTargets || []).find(function(t) { return t.id === selectedTargetID; }) || {};

    const titleEl  = document.getElementById('remote-out-title');
    const detailEl = document.getElementById('remote-out-detail');
    outEl.style.display = '';
    titleEl.textContent = 'Live Response — ' + host;

    const tabs = ['processes','network','services','users','autoruns','tasks','logons','command'];
    let html =
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">' +
        '<label class="form-label" style="margin:0;white-space:nowrap">Password:</label>' +
        '<input class="form-input" id="lr-password" type="password" style="width:180px" placeholder="Leave blank for key auth">' +
        '<button class="btn btn-secondary btn-sm" onclick="liveResponseRefresh()" style="margin-left:auto">&#x21bb; Refresh</button>' +
        '</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-1)">';
    tabs.forEach(function(t) {
        html += '<button class="btn btn-secondary btn-sm" id="lr-tab-' + t + '" onclick="liveResponseTab(\'' + t + '\')" style="font-size:12px">' +
            t.charAt(0).toUpperCase() + t.slice(1) + '</button>';
    });
    html += '</div><div id="lr-content"><p style="color:var(--text-3);font-size:13px">Select a tab above to load data from the endpoint.</p></div>';

    detailEl.innerHTML = html;
    scrollToOutput('remote-output');
    window._lrCurrentTab = null;
    liveResponseTab('processes');
}

async function liveResponseTab(tab) {
    window._lrCurrentTab = tab;
    document.querySelectorAll('[id^="lr-tab-"]').forEach(function(b) {
        b.style.background = '';
        b.style.color = '';
    });
    const activeBtn = document.getElementById('lr-tab-' + tab);
    if (activeBtn) { activeBtn.style.background = 'var(--brand)'; activeBtn.style.color = '#fff'; }

    const contentEl = document.getElementById('lr-content');
    if (!contentEl) return;

    if (tab === 'command') {
        contentEl.innerHTML =
            '<div style="display:flex;gap:8px;margin-bottom:10px">' +
            '<input class="form-input" id="lr-cmd" placeholder="Enter command..." ' +
            'style="flex:1;font-family:var(--font-mono);font-size:13px">' +
            '<button class="btn btn-primary" onclick="liveResponseRunCmd()">Run</button></div>' +
            '<pre id="lr-cmd-output" style="font-size:12px;font-family:var(--font-mono);color:var(--text-2);' +
            'background:var(--bg-code);padding:16px;border-radius:var(--radius);min-height:200px;' +
            'max-height:500px;overflow:auto;white-space:pre-wrap"></pre>';
        var cmdInput = document.getElementById('lr-cmd');
        if (cmdInput) {
            cmdInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') liveResponseRunCmd(); });
        }
        return;
    }

    contentEl.innerHTML = '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Loading ' + tab + '...</div>';

    const password = (document.getElementById('lr-password') || {}).value || '';
    try {
        const res = await api('remote/live-response', 'POST', {
            target_id: selectedTargetID,
            module: tab,
            password: password,
        });
        if (res.format === 'json' && res.stdout) {
            try {
                var data = JSON.parse(res.stdout);
                contentEl.innerHTML = renderLiveResponseTable(tab, data);
            } catch(_) {
                contentEl.innerHTML = lrPreBlock(res.stdout);
            }
        } else {
            contentEl.innerHTML = lrPreBlock(res.stdout || '(no output)');
        }
        if (res.error) {
            contentEl.innerHTML += '<p style="color:var(--yellow);font-size:12px;margin-top:8px">' + escapeHTML(res.error) + '</p>';
        }
    } catch(e) {
        contentEl.innerHTML = '<p style="color:var(--red);font-size:13px">' + escapeHTML(e.message) + '</p>';
    }
}

function lrPreBlock(text) {
    return '<pre style="font-size:12px;font-family:var(--font-mono);color:var(--text-2);background:var(--bg-code);' +
        'padding:16px;border-radius:var(--radius);max-height:500px;overflow:auto;white-space:pre-wrap">' +
        escapeHTML(text) + '</pre>';
}

function liveResponseRefresh() {
    if (window._lrCurrentTab) liveResponseTab(window._lrCurrentTab);
}

async function liveResponseRunCmd() {
    if (!selectedTargetID) { showToast('Select a target first', 'warning'); return; }
    const cmdEl    = document.getElementById('lr-cmd');
    const outputEl = document.getElementById('lr-cmd-output');
    if (!cmdEl || !outputEl) return;
    const cmd = cmdEl.value.trim();
    if (!cmd) return;
    cmdEl.value = '';
    outputEl.textContent += '\n> ' + cmd + '\n';
    outputEl.scrollTop = outputEl.scrollHeight;
    const password = (document.getElementById('lr-password') || {}).value || '';
    try {
        const res = await api('remote/live-response', 'POST', {
            target_id: selectedTargetID, module: 'command', command: cmd, password: password
        });
        outputEl.textContent += (res.stdout || '');
        if (res.stderr) outputEl.textContent += '\nSTDERR: ' + res.stderr;
        outputEl.textContent += '\n';
    } catch(e) {
        outputEl.textContent += 'ERROR: ' + e.message + '\n';
    }
    outputEl.scrollTop = outputEl.scrollHeight;
}

function renderLiveResponseTable(tab, data) {
    if (!Array.isArray(data)) data = [data];
    if (!data || data.length === 0) return '<p style="color:var(--text-3);font-size:13px">No data returned.</p>';
    var first = data.find(function(r) { return r && typeof r === 'object'; });
    if (!first) return lrPreBlock(JSON.stringify(data, null, 2));
    var keys = Object.keys(first).filter(function(k) { return first[k] !== undefined; });
    var html = '<div class="table-container" style="max-height:500px;overflow:auto"><table style="font-size:12px"><thead><tr>';
    keys.forEach(function(k) { html += '<th>' + escapeHTML(k) + '</th>'; });
    html += '</tr></thead><tbody>';
    data.forEach(function(row) {
        if (!row || typeof row !== 'object') return;
        html += '<tr>';
        keys.forEach(function(k) {
            var val = row[k];
            if (val === null || val === undefined) val = '';
            if (typeof val === 'object') val = JSON.stringify(val);
            html += '<td style="font-family:var(--font-mono);font-size:11px;max-width:260px;overflow:hidden;' +
                'text-overflow:ellipsis;white-space:nowrap" title="' + escapeHTML(String(val)) + '">' +
                escapeHTML(String(val)) + '</td>';
        });
        html += '</tr>';
    });
    html += '</tbody></table></div>';
    html += '<p style="font-size:11px;color:var(--text-3);margin-top:8px">' +
        data.length + ' record' + (data.length !== 1 ? 's' : '') +
        ' &mdash; ' + new Date().toLocaleTimeString() + '</p>';
    return html;
}

// ── Multi-target selection helpers ───────────────────────────────────────────

function onTargetCheckboxChange(cb, id) {
    if (cb.checked) {
        selectedTargetID = id;
    } else {
        // If we unchecked the currently-selected target, pick another if any remain checked.
        if (id === selectedTargetID) {
            const others = document.querySelectorAll('input[name="target-select"]:checked');
            selectedTargetID = others.length > 0 ? parseInt(others[0].dataset.id) : null;
        }
    }
}

function getSelectedTargetIDs() {
    const ids = [];
    document.querySelectorAll('input[name="target-select"]:checked').forEach(function(cb) {
        ids.push(parseInt(cb.dataset.idx));
    });
    return ids;
}

    const d = e.detail || {};

    let html = completionBanner(ok ? 'success' : 'partial',

            '<thead><tr><th>Host</th><th>OS</th><th>OK</th><th>Failed</th><th>Duration</th></tr></thead><tbody>';

            html += '<tr>' +
                '<td style="font-family:var(--font-mono)">' + escapeHTML(hr.Host || '') + '</td>' +
                '<td>' + escapeHTML(hr.OS || '') + '</td>' +
                '<td style="color:var(--green)">' + (hr.Success || 0) + '</td>' +
                '<td style="color:' + ((hr.Failed || 0) > 0 ? 'var(--red)' : 'var(--text-3)') + '">' + (hr.Failed || 0) + '</td>' +

async function doEvidenceCollect() {
    const ids = getSelectedTargetIDs();
    const templates = [];
    document.querySelectorAll('input[name="ev-tmpl"]:checked').forEach(function(cb) { templates.push(cb.value); });
    const customEl = document.getElementById('ev-custom');
    const customPaths = customEl ? customEl.value.split('\n').map(function(s) { return s.trim(); }).filter(Boolean) : [];
    const maxParallel = parseInt((document.getElementById('multi-parallel') || {}).value) || 3;
    const password    = (document.getElementById('multi-password') || {}).value || '';
    closeModal();

    const outEl    = document.getElementById('remote-output');
    const titleEl  = document.getElementById('remote-out-title');
    const detailEl = document.getElementById('remote-out-detail');
    outEl.style.display = '';
    titleEl.textContent = 'Evidence Collection — ' + ids.length + ' endpoint' + (ids.length > 1 ? 's' : '');
    detailEl.innerHTML = '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Collecting evidence from ' + ids.length + ' endpoint(s)...</div>';
    scrollToOutput('remote-output');

    try {
        await api('remote/evidence-collect', 'POST', {
            target_ids: ids, templates: templates,
            custom_paths: customPaths, max_parallel: maxParallel, password: password
        });
    } catch(e) {
        detailEl.innerHTML = completionBanner('failed', 'Evidence Collection', e.message);
    }
}

            '<thead><tr><th>Host</th><th>Hits</th></tr></thead><tbody>';
        hostResults.forEach(function(hr) {
            const bad = (hr.hits || 0) > 0;
            html += '<tr>' +
                '<td style="font-family:var(--font-mono)">' + escapeHTML(hr.host || '') + '</td>' +
                '<td style="color:' + (bad ? 'var(--red)' : 'var(--green)') + ';font-weight:600">' + (hr.hits || 0) + '</td>' +
                '</tr>';
        });
        html += '</tbody></table></div>';
    }
    // Hit details

        html += '<h3 style="margin:16px 0 8px;color:var(--red);font-size:14px">HITS</h3>';
        html += '<div class="table-container"><table>' +
            '<thead><tr><th>Host</th><th>IOC</th><th>Type</th><th>Details</th></tr></thead><tbody>';
        hits.forEach(function(h) {

                escapeHTML((h.details || '').substring(0, 300)) + '</td></tr>';
        });
        html += '</tbody></table></div>';
    }
    const detailEl = document.getElementById('remote-out-detail');
    if (detailEl) detailEl.innerHTML = html;
    showToast(hasHits ? 'IOC sweep complete — hits found!' : 'IOC sweep complete — clean', hasHits ? 'warning' : 'success');
});

async function loadFindings() {
    try {
        const findings = await api('analysis/findings');

        if (!el) return;
        if (!findings || findings.length === 0) {
            el.innerHTML = '<p style="color:var(--text-2);font-size:13px">No findings recorded yet. Run threat hunting or use cases to generate findings.</p>';
            return;
        }
        let html = '<div class="table-container"><table>' +
            '<thead><tr><th>Severity</th><th>Title</th><th>MITRE</th><th>Source</th><th>Time</th></tr></thead><tbody>';
        findings.forEach(function(f) {
            const sev = (f.Severity || '').toLowerCase();
            const cls = sev === 'critical' ? 'error' : sev === 'high' ? 'warning' : sev === 'medium' ? 'info' : 'success';
            html += '<tr>' +
                '<td><span class="badge badge-' + cls + '">' + escapeHTML(sev.toUpperCase()) + '</span></td>' +
                '<td>' + escapeHTML(f.Title || '') + '</td>' +
                '<td style="font-family:var(--font-mono);font-size:12px">' + escapeHTML(f.MITRETechnique || '-') + '</td>' +
                '<td>' + escapeHTML(f.IOCType || '-') + '</td>' +
                '<td style="font-size:12px">' + (f.DiscoveredAt ? escapeHTML(new Date(f.DiscoveredAt).toLocaleString()) : '-') + '</td>' +
                '</tr>';
        });
        html += '</tbody></table></div>';

    } catch (err) {
        const el = document.getElementById('findings-list');
        if (el) el.innerHTML = '<p style="color:var(--red)">Failed to load findings: ' + escapeHTML(err.message) + '</p>';
    }
}

async function runAnalysis(type) {
    if (!appState.active_case) { showToast('Create a case first', 'warning'); return; }
    const btn      = (typeof event !== 'undefined') ? event.target : null;
    const outputEl = document.getElementById('analysis-output');
    const titleEl  = document.getElementById('analysis-output-title');
    const detailEl = document.getElementById('analysis-output-detail');
    outputEl.style.display = '';
    titleEl.textContent = type.replace(/_/g, ' ');
    detailEl.innerHTML = '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Processing...</div>';
    scrollToOutput('analysis-output');
    if (btn) setButtonLoading(btn);
    try {
        const r = await api('analysis/' + type, 'POST');
        const analysisBannerStatus = r.status === 'deferred' ? 'partial' : 'success';
        let html = completionBanner(analysisBannerStatus, type.replace(/_/g, ' '), r.message || 'Complete');
        if (r.output_path) {
            html += '<p style="margin-top:8px;font-size:13px">Output: <span style="color:var(--brand);font-family:var(--font-mono);font-size:12px">' +
                escapeHTML(r.output_path) + '</span></p>';
        }
        detailEl.innerHTML = html;
    } catch (err) {
        detailEl.innerHTML = completionBanner('failed', type.replace(/_/g, ' '), err.message);
    } finally {
        if (btn) clearButtonLoading(btn);
    }
}

            '  <div><span style="color:var(--text-2);font-size:12px">Severity</span><br>' +

// updateRules drives POST /api/update/rules and renders the per-set
// `update_rules` WebSocket events as they tick. Each event carries
// {id, status, name?, error?}; the `all_complete` terminator triggers a
// success toast and removes the listener.
let ruleUpdateListener = null;
async function updateRules(type) {
    const el = document.getElementById('rule-update-results');
    if (!el) return;
    const lines = {};
    el.innerHTML = '<div class="progress-item"><span class="progress-icon running">&#x21bb;</span> Updating ' + escapeHTML(type) + ' rules...</div>';

    if (ruleUpdateListener) {
        document.removeEventListener('ws-update_rules', ruleUpdateListener);
        ruleUpdateListener = null;
    }
    ruleUpdateListener = function(e) {
        const d = e.detail || {};
        if (d.status === 'all_complete') {
            document.removeEventListener('ws-update_rules', ruleUpdateListener);
            ruleUpdateListener = null;
            const failures = (d.outcomes || []).filter(function(o) { return o.status === 'failed'; });
            const okMsg = '<div class="progress-item" style="margin-top:8px"><span class="progress-icon done">&#x2713;</span> ' +
                          '<strong style="color:var(--green)">Rule update complete</strong></div>';
            el.innerHTML = renderRuleLines(lines) + okMsg;
            showToast(failures.length
                ? ('Rules updated with ' + failures.length + ' failure(s)')
                : 'Rules updated', failures.length ? 'warning' : 'success');
            return;
        }
        if (d.id) {
            lines[d.id] = {
                id:     d.id,
                name:   d.name || d.id,
                status: d.status,
                error:  d.error,
            };
            el.innerHTML = renderRuleLines(lines);
        }
    };
    document.addEventListener('ws-update_rules', ruleUpdateListener);

    try {
        await api('update/rules', 'POST', { type: type });
    } catch (err) {
        document.removeEventListener('ws-update_rules', ruleUpdateListener);
        ruleUpdateListener = null;
        el.innerHTML = '<p style="color:var(--red)">' + escapeHTML(err.message) + '</p>';
    }
}

function renderRuleLines(lines) {
    return Object.keys(lines).map(function(k) {
        const e = lines[k];
        let icon = '<span class="progress-icon pending">&middot;</span>';
        if (e.status === 'running')       icon = '<span class="progress-icon running">&#x21bb;</span>';
        else if (e.status === 'complete') icon = '<span class="progress-icon done">&#x2713;</span>';
        else if (e.status === 'failed')   icon = '<span class="progress-icon failed">&#x2717;</span>';
        const errFrag = e.error ? ' &mdash; <span style="color:var(--red)">' + escapeHTML(e.error) + '</span>' : '';
        return '<div class="progress-item">' + icon +
            ' <span style="min-width:200px">' + escapeHTML(e.name) + '</span>' +
            ' <span style="color:var(--text-3);font-size:12px">' + escapeHTML(e.status) + '</span>' +
            errFrag + '</div>';
    }).join('');
}

// ============================================================
// Floating cancel bar — backed by /api/tasks
// ============================================================
//
// Any backend handler that registers a task via StartTask() emits
// task_started → task_ended (or task_cancelled) WebSocket events. The
// bar tracks the most recent task; clicking Cancel POSTs to
// /api/tasks/cancel and the backend goroutine notices via ctx.Done().

let activeTaskId = null;
let activeTaskName = '';
let activeTaskStarted = 0;
let _cancelTimer = null;

document.addEventListener('ws-task_started', function(e) {
    const d = e.detail || {};
    activeTaskId = d.task_id;
    activeTaskName = d.name || 'Operation';
    activeTaskStarted = Date.now();
    showCancelBar();
});

document.addEventListener('ws-task_ended', function(e) {
    const d = e.detail || {};
    if (d.task_id === activeTaskId) {
        hideCancelBar();
    }
});

document.addEventListener('ws-task_cancelled', function(e) {
    const d = e.detail || {};
    if (d.task_id === activeTaskId) {
        showToast('Cancelling: ' + (d.name || activeTaskName), 'warning');
        // Paint a cancelled banner in whichever output area is currently
        // showing "running" progress so the analyst gets immediate feedback.
        const outputAreas = [
            'triage-results', 'hunt-progress-detail', 'memory-progress-detail',
            'disk-out-detail', 'analysis-output-detail', 'velo-output-detail'
        ];
        for (var i = 0; i < outputAreas.length; i++) {
            var el = document.getElementById(outputAreas[i]);
            if (el && el.innerHTML.indexOf('progress-icon running') !== -1) {
                el.innerHTML = completionBanner('cancelled', d.name || activeTaskName, 'Task cancelled by user');
                break;
            }
        }
        // Don't hide yet — wait for task_ended so the bar stays visible
        // while the goroutine winds down (gives feedback that the cancel
        // was received).
    }
});

function showCancelBar() {
    let bar = document.getElementById('cancel-bar');
    if (!bar) {
        bar = document.createElement('div');
        bar.id = 'cancel-bar';
        document.body.appendChild(bar);
    }
    bar.innerHTML =
        '<div style="display:flex;align-items:center;gap:12px;min-width:0;flex:1">' +
        '  <span class="progress-icon running" style="display:inline-block;animation:spin 1s linear infinite">&#x21bb;</span>' +
        '  <span style="font-size:14px;color:var(--text-0);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' +
        escapeHTML(activeTaskName) + '</span>' +
        '  <span id="cancel-bar-elapsed" style="font-size:12px;color:var(--text-3);font-family:var(--font-mono)">00:00</span>' +
        '</div>' +
        '<button class="btn btn-danger btn-sm" onclick="cancelActiveTask()" style="min-width:120px">Cancel Task</button>';
    bar.style.display = 'flex';

    if (_cancelTimer) clearInterval(_cancelTimer);
    _cancelTimer = setInterval(function() {
        const el = document.getElementById('cancel-bar-elapsed');
        if (!el) return;
        const elapsed = Math.floor((Date.now() - activeTaskStarted) / 1000);
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }, 1000);
}

function hideCancelBar() {
    if (_cancelTimer) { clearInterval(_cancelTimer); _cancelTimer = null; }
    activeTaskId = null;
    activeTaskName = '';
    const bar = document.getElementById('cancel-bar');
    if (bar) bar.style.display = 'none';
}

async function cancelActiveTask() {
    if (!activeTaskId) return;
    try {
        await api('tasks/cancel', 'POST', { task_id: activeTaskId });
    } catch (err) {
        showToast('Cancel failed: ' + err.message, 'error');
    }
}

// ----- Init.
document.addEventListener('DOMContentLoaded', function() {
    connectWebSocket();
    navigate('home');
    // Page reload mid-task: pick up any in-flight task so the cancel bar
    // re-attaches without waiting for the next task_started event.
    api('tasks').then(function(running) {
        if (running && running.length > 0) {
            const t = running[0];
            activeTaskId = t.id;
            activeTaskName = t.name || 'Operation';
            activeTaskStarted = t.started_at ? Date.parse(t.started_at) : Date.now();
            showCancelBar();
        }
    }).catch(function() {});
});
</script>

</body>
